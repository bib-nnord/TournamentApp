openapi: 3.0.3
info:
  title: Tournament App API
  version: 1.0.0
  description: Backend API for the Tournament App

servers:
  - url: http://localhost:2000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

  responses:
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Internal server error

paths:
  /:
    get:
      summary: Health check
      tags: [General]
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              example:
                status: ok

  /auth/register:
    post:
      summary: Create a new account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  maxLength: 50
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                display_name:
                  type: string
                  maxLength: 100
                first_name:
                  type: string
                  maxLength: 100
                last_name:
                  type: string
                  maxLength: 100
                date_of_birth:
                  type: string
                  format: date
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Account created successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  value:
                    error: "username, email, and password are required"
                weakPassword:
                  value:
                    error: Password must be at least 8 characters
        "409":
          description: Conflict — duplicate email or username
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                duplicateEmail:
                  value:
                    error: An account with that email already exists
                duplicateUsername:
                  value:
                    error: An account with that username already exists
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      summary: Log in and receive tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT token (15m expiry)
                  refreshToken:
                    type: string
                    description: Opaque token (7d expiry)
                  user:
                    $ref: "#/components/schemas/User"
              example:
                accessToken: eyJhbGciOiJIUzI1NiIs...
                refreshToken: a1b2c3d4e5f6...
                user:
                  id: 1
                  username: johndoe
                  email: john@example.com
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email and password are required
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Invalid email or password
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      summary: Refresh the access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT token (15m expiry)
              example:
                accessToken: eyJhbGciOiJIUzI1NiIs...
        "400":
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: refreshToken is required
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalid:
                  value:
                    error: Invalid refresh token
                expired:
                  value:
                    error: Refresh token expired
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      summary: Log out and invalidate refresh token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Logged out successfully
        "400":
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: refreshToken is required
        "500":
          $ref: "#/components/responses/InternalServerError"
