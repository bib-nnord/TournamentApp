openapi: 3.0.3
info:
  title: Tournament App API
  version: 1.0.0
  description: Backend API for the Tournament App

servers:
  - url: http://localhost:2000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: Something went wrong

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        allowMessagesFrom:
          type: string
          enum: [everyone, friends_only]

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    UserListItem:
      allOf:
        - $ref: "#/components/schemas/UserSummary"
        - type: object
          properties:
            bio:
              type: string
              nullable: true
            location:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        role:
          type: string
          enum: [lead, moderator, member]

    TeamDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        open:
          type: boolean
        disciplines:
          type: array
          items:
            type: string
        createdBy:
          $ref: "#/components/schemas/UserSummary"
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        membersCount:
          type: integer
        myRole:
          type: string
          enum: [lead, moderator, member, none]

    TeamSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [lead, moderator, member]
        members:
          type: integer
        open:
          type: boolean

    Message:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [users, teams, tournaments, website]
        folder:
          type: string
          enum: [inbox, sent]
        senderId:
          type: integer
          nullable: true
        recipientId:
          type: integer
          nullable: true
        sender:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UserSummary"
        recipient:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UserSummary"
        subject:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        referenceId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    FriendshipStatus:
      type: string
      enum: [pending, accepted, blocked, pending_sent, pending_received]

    FriendListItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true

    FriendRequest:
      type: object
      properties:
        id:
          type: integer
        status:
          $ref: "#/components/schemas/FriendshipStatus"
        requesterId:
          type: integer
        recipientId:
          type: integer
        requester:
          $ref: "#/components/schemas/UserSummary"
        recipient:
          $ref: "#/components/schemas/UserSummary"
        createdAt:
          type: string
          format: date-time

    BracketMatch:
      type: object
      properties:
        id:
          type: string
        position:
          type: integer
        participantA:
          type: string
          nullable: true
        participantB:
          type: string
          nullable: true
        winner:
          type: string
          nullable: true
        tie:
          type: boolean
        completed:
          type: boolean
        scoreA:
          type: number
          nullable: true
        scoreB:
          type: number
          nullable: true

    TournamentParticipant:
      type: object
      properties:
        seed:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [account, guest]
        confirmed:
          type: boolean
        declined:
          type: boolean

    TournamentSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        game:
          type: string
        format:
          type: string
          enum: [single_elimination, double_elimination, round_robin, double_round_robin, combination, swiss]
        status:
          type: string
          enum: [active, completed, cancelled]
        isPrivate:
          type: boolean
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time

    TournamentDetail:
      allOf:
        - $ref: "#/components/schemas/TournamentSummary"
        - type: object
          properties:
            description:
              type: string
              nullable: true
            maxParticipants:
              type: integer
              nullable: true
            startDate:
              type: string
              format: date-time
              nullable: true
            bracketData:
              type: object
              nullable: true
            participants:
              type: array
              items:
                $ref: "#/components/schemas/TournamentParticipant"
            updatedAt:
              type: string
              format: date-time

  responses:
    Unauthorized:
      description: Missing or invalid authorization token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Authorization header required

    Forbidden:
      description: Authenticated but not permitted to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Not authorized

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Not found

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Internal server error

paths:
  # ─── Health ────────────────────────────────────────────────────────────────

  /:
    get:
      summary: Health check
      tags: [General]
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              example:
                status: ok

  # ─── Auth ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      summary: Create a new account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password, display_name, first_name, last_name, date_of_birth]
              properties:
                username:
                  type: string
                  maxLength: 50
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a special character
                display_name:
                  type: string
                  maxLength: 100
                first_name:
                  type: string
                  maxLength: 100
                last_name:
                  type: string
                  maxLength: 100
                date_of_birth:
                  type: string
                  format: date
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Account created successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      summary: Log in and receive tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                password:
                  type: string
              description: Provide either email or username plus password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT token (15m expiry)
                  refreshToken:
                    type: string
                    description: Opaque token (7d expiry)
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      summary: Refresh the access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        "400":
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      summary: Log out and invalidate refresh token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ─── Users ─────────────────────────────────────────────────────────────────

  /users:
    get:
      summary: List all users (paginated)
      tags: [Users]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: q
          schema:
            type: string
          description: Search by username or display name
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserListItem"
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  total:
                    type: integer
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/search:
    get:
      summary: Search users by username or display name
      tags: [Users]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        "200":
          description: List of matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/me:
    get:
      summary: Get the current user's profile
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      summary: Update the current user's settings
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                allowMessagesFrom:
                  type: string
                  enum: [everyone, friends_only]
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: No valid fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ─── Teams ─────────────────────────────────────────────────────────────────

  /teams/search:
    get:
      summary: Search teams by name
      tags: [Teams]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        "200":
          description: List of matching teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamDetail"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams/my:
    get:
      summary: Get the current user's teams
      tags: [Teams]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of teams the current user belongs to
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams/user/{userId}:
    get:
      summary: Get teams for a specific user
      tags: [Teams]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teams the user belongs to
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamSummary"
        "400":
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams:
    post:
      summary: Create a new team
      tags: [Teams]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                description:
                  type: string
                open:
                  type: boolean
                  default: false
                disciplines:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    $ref: "#/components/schemas/TeamSummary"
        "400":
          description: Team name is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams/{id}:
    get:
      summary: Get team details
      tags: [Teams]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    $ref: "#/components/schemas/TeamDetail"
        "400":
          description: Invalid team ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      summary: Update team settings (lead or moderator)
      tags: [Teams]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                open:
                  type: boolean
                disciplines:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    $ref: "#/components/schemas/TeamDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Disband a team (lead only)
      tags: [Teams]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Team disbanded
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams/{id}/join:
    post:
      summary: Join an open team
      tags: [Teams]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined the team
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    $ref: "#/components/schemas/TeamDetail"
        "403":
          description: Team is closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams/{id}/leave:
    post:
      summary: Leave a team
      tags: [Teams]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Left the team
        "400":
          description: Transfer leadership before leaving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /teams/{id}/members/{userId}:
    patch:
      summary: Update a team member's role (lead only)
      tags: [Teams]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [moderator, member]
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: "#/components/schemas/TeamMember"
        "400":
          description: Invalid role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Kick a team member (lead or moderator)
      tags: [Teams]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Member kicked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ─── Messages ──────────────────────────────────────────────────────────────

  /messages:
    get:
      summary: List messages (inbox or sent)
      tags: [Messages]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: folder
          schema:
            type: string
            enum: [inbox, sent]
            default: inbox
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Send a message
      tags: [Messages]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientId, subject, body, category]
              properties:
                recipientId:
                  type: integer
                subject:
                  type: string
                body:
                  type: string
                category:
                  type: string
                  enum: [users, teams, tournaments, website]
                referenceId:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Recipient does not accept messages from you
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /messages/unread-count:
    get:
      summary: Get count of unread inbox messages
      tags: [Messages]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Unread message count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /messages/read-all:
    patch:
      summary: Mark all inbox messages as read
