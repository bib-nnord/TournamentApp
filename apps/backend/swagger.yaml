          $ref: "#/components/responses/InternalServerError"

  # ─── Friends ───────────────────────────────────────────────────────────────

  /friends:
    get:
      summary: List accepted friends
      tags: [Friends]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: object
                properties:
                  friends:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/requests:
    get:
      summary: List pending friend requests (incoming and outgoing)
      tags: [Friends]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Pending friend requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  incoming:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendRequest"
                  outgoing:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/status/{username}:
    get:
      summary: Get friendship status with a user
      tags: [Friends]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Friendship status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: "#/components/schemas/FriendshipStatus"
                  friendshipId:
                    type: integer
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/user/{username}:
    get:
      summary: List accepted friends of a specific user
      tags: [Friends]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Friend list
          content:
            application/json:
              schema:
                type: object
                properties:
                  friends:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/request:
    post:
      summary: Send a friend request
      tags: [Friends]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        "201":
          description: Friend request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "400":
          description: Cannot send request to yourself or already friends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/{id}/accept:
    patch:
      summary: Accept a friend request
      tags: [Friends]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/{id}/decline:
    patch:
      summary: Decline a friend request
      tags: [Friends]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Friend request declined
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /friends/{id}:
    delete:
      summary: Remove a friend
      tags: [Friends]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Friend removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ─── Tournaments ───────────────────────────────────────────────────────────

  /tournaments:
    get:
      summary: List tournaments
      tags: [Tournaments]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, completed, cancelled]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: q
          schema:
            type: string
          description: Search by name
      responses:
        "200":
          description: Paginated list of tournaments
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: "#/components/schemas/TournamentSummary"
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  total:
                    type: integer
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Create a tournament
      tags: [Tournaments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, game, format, participants]
              properties:
                name:
                  type: string
                game:
                  type: string
                description:
                  type: string
                format:
                  type: string
                  enum: [single_elimination, double_elimination, round_robin, double_round_robin, combination, swiss]
                isPrivate:
                  type: boolean
                  default: false
                maxParticipants:
                  type: integer
                startDate:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [active, completed, cancelled]
                participants:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        enum: [account, guest]
                bracketData:
                  type: object
                  description: Pre-generated bracket structure from the client
      responses:
        "201":
          description: Tournament created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tournaments/my-matches:
    get:
      summary: Get tournaments the current user is a participant in
      tags: [Tournaments]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of tournament summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TournamentSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tournaments/{id}:
    get:
      summary: Get tournament details
      tags: [Tournaments]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      summary: Update a tournament
      tags: [Tournaments]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                game:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [active, completed, cancelled]
                bracketData:
                  type: object
                clientUpdatedAt:
                  type: string
                  format: date-time
                  description: Optimistic concurrency check
      responses:
        "200":
          description: Updated tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Concurrent modification conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Delete a tournament
      tags: [Tournaments]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tournaments/{id}/confirm:
    patch:
      summary: Confirm or decline participation in a tournament
      tags: [Tournaments]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  description: true to confirm, false to decline
      responses:
        "200":
          description: Participation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tournaments/{id}/matches/{matchId}:
    get:
      summary: Get a specific match
      tags: [Tournaments]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                type: object
                properties:
                  match:
                    $ref: "#/components/schemas/BracketMatch"
                  section:
                    type: string
                  roundIndex:
                    type: integer
                  allowTies:
                    type: boolean
                  tournament:
                    $ref: "#/components/schemas/TournamentSummary"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      summary: Report a match result
      tags: [Tournaments]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                winner:
                  type: string
                  enum: [a, b, tie]
                  description: Required unless reset is true
                scoreA:
                  type: number
                  nullable: true
                scoreB:
                  type: number
                  nullable: true
                reset:
                  type: boolean
                  description: Reset a tiebreaker match result
                clientUpdatedAt:
                  type: string
                  format: date-time
                  description: Optimistic concurrency check
      responses:
        "200":
          description: Match result recorded and bracket advanced
          content:
            application/json:
              schema:
                type: object
                properties:
                  bracketData:
                    type: object
                  updatedAt:
                    type: string
                    format: date-time
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Concurrent modification conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"
