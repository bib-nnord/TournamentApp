services:
  db:
    image: postgres:14.1-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes: 
      - db:/var/lib/postgresql/data
  api:
    container_name: tournament-app
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: tournament-app
    depends_on:
      - db
    ports:
      - 2000:2000
    environment:
      NODE_ENV: production
      PORT: 2000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/postgres"
      JWT_SECRET: "replace_with_your_production_secret"
      FRONTEND_URL: "http://localhost:3000"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "noreply@tournamentapp.com"
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
volumes:
  db:
    driver: local