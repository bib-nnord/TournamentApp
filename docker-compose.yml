version: '3.8'
services:
  db:
    image: postgres:14.1-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes: 
      - db:/var/lib/postgresql/data
  api:
    container_name: tournament-app
    build:
      context: ./apps/backend
      # Remove 'target' unless you have a multi-stage Dockerfile
    image: tournament-app
    depends_on:
      - db
    ports:
      - 2000:2000
    environment:
      NODE_ENV: production
      PORT: 2000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/postgres"
      JWT_SECRET: "replace_with_your_production_secret"
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    links:
      - db
    volumes:
      - './apps/backend:/app'
volumes:
  db:
    driver: local